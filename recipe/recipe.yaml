schema_version: 1

context:
  version: 1.6.1

package:
  name: livekit-plugins-turn-detector
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-plugins-turn-detector/livekit_plugins_turn_detector-${{ version }}.tar.gz
    sha256: 27e13f3718575921f7ddad6da295f4514e8d4608875251a0b60e2b6004194821
  - url: https://raw.githubusercontent.com/livekit/agents/refs/tags/livekit-agents%40${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - livekit-agents >=1.6.1
    - transformers >=4.47.1,!=4.57.2,!=4.57.3
    - numpy >=1.26
    - onnxruntime >=1.18,<1.24
    - jinja2
tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - livekit.plugins.turn_detector
      pip_check: true

about:
  summary: End of utterance detection for LiveKit Agents
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit-plugins-turn-detector/
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
